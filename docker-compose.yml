services:
  postgres:
    image: postgres:16-alpine
    container_name: domino-art-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: domino
      POSTGRES_PASSWORD: domino
      POSTGRES_DB: domino_art
    ports:
      - "5432:5432"
    volumes:
      - domino_art_pgdata:/var/lib/postgresql/data

volumes:
  domino_art_pgdata:
